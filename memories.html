    <style>
        .mem-gallery {
            background: #0d0d0d;
            padding: 60px 20px 80px;
        }

        .mem-grid {
            max-width: 1200px;
            margin: 0 auto;
            columns: 3;
            column-gap: 16px;
        }

        .mem-item {
            break-inside: avoid;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            border-radius: 3px;
            background: #1a1a1a;
            cursor: pointer;
        }

        .mem-item img {
            width: 100%;
            display: block;
            filter: brightness(0.85);
            transition: filter 0.4s ease, transform 0.6s ease;
        }

        .mem-item:hover img {
            filter: brightness(1);
            transform: scale(1.03);
        }

        .mem-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 16px 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            font-family: 'Noto Serif SC', serif;
            font-size: 0.9rem;
            color: #e0d8c8;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .mem-item:hover .mem-caption {
            opacity: 1;
        }

        /* Lightbox */
        .mem-lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        .mem-lightbox.active {
            display: flex;
        }

        .mem-lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 2px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }

        .mem-lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #999;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10000;
            font-family: sans-serif;
            transition: color 0.2s;
        }

        .mem-lightbox-close:hover {
            color: #fff;
        }

        @media (max-width: 900px) {
            .mem-grid {
                columns: 2;
            }
        }

        @media (max-width: 500px) {
            .mem-grid {
                columns: 1;
            }
        }
    </style>

    <!-- Lightbox -->
    <div class="mem-lightbox" id="memLightbox">
        <span class="mem-lightbox-close" id="memClose">&times;</span>
        <img id="memLightboxImg" src="" alt="">
    </div>

    <script src="js/components.min.js"></script>
    <script src="js/i18n.min.js"></script>
    <script src="js/main.min.js"></script>
    <script>
    (function(){
        var lightbox = document.getElementById('memLightbox');
        var lbImg = document.getElementById('memLightboxImg');
        var closeBtn = document.getElementById('memClose');
        document.querySelectorAll('.mem-item img').forEach(function(img){
            img.addEventListener('click', function(){
                lbImg.src = img.src;
                lbImg.alt = img.alt;
                lightbox.classList.add('active');
            });
        });
        lightbox.addEventListener('click', function(e){
            if (e.target !== lbImg) lightbox.classList.remove('active');
        });
        closeBtn.addEventListener('click', function(){ lightbox.classList.remove('active'); });
        document.addEventListener('keydown', function(e){
            if (e.key === 'Escape') lightbox.classList.remove('active');
        });
    })();
    </script>
